        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', -apple-system, sans-serif; }
        body { margin: 0; padding: 12px; background: var(--nu-gray); color: var(--nu-text); line-height: 1.4; }
        
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 500px; margin: auto; }

        .btn:disabled { background: #ccc; cursor: not-allowed; }
        
        .link-sec { display: block; text-align: center; color: var(--nu-purple); text-decoration: none; font-size: 13px; margin-top: 15px; font-weight: 600; }

        #reader {

        #status-info { padding: 10px; border-radius: 8px; font-size: 14px; text-align: center; margin-bottom: 10px; background: #eee; }
    </style>
</head>

      // --- LÓGICA DE NAVEGAÇÃO E CADASTRO ---
    let enviando = false;

    function showScreen(id) {
        document.querySelectorAll('.card').forEach(s => s.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

function realizarLogin() {
    // 1. Captura os valores dos campos que o usuário digitou
    const email = document.getElementById('login-user').value;
    const senha = document.getElementById('login-pass').value;
    const transp = document.getElementById('login-transp').value;

    // 2. Validação simples antes de enviar
    if (!email || !senha || !transp) {
        return alert("Por favor, preencha E-mail, Senha e selecione a Transportadora.");
    }

    // --- AQUI ENTRA A LINHA DETALHADA ---
    // Ela monta o "endereço" da requisição com os dados do usuário
    const url = `${urlSheets}?action=validarLogin&email=${encodeURIComponent(email)}&senha=${encodeURIComponent(senha)}&transp=${encodeURIComponent(transp)}`;

    // 3. O fetch envia essa URL para o Google
    fetch(url)
        .then(res => res.json())
        .then(res => {
            if (res.authorized) {
                // Se o login for um sucesso:
                alert("Login realizado com sucesso! Bem-vindo(a), " + res.nome);
                
                // Preenche o campo 'Conferente' na tela principal com o nome vindo da planilha
                document.getElementById('usuario').value = res.nome;
                
                // Muda da tela de Login para a tela de Conferência
                showScreen('screen-main');
                
                // Inicia o carregamento dos romaneios (sua função original)
                if (typeof carregarRomaneios === "function") carregarRomaneios();
            } else {
                // Se os dados estiverem errados
                alert("E-mail, senha ou transportadora incorretos.");
            }
        })
        .catch(err => {
            console.error("Erro na comunicação:", err);
            alert("Não foi possível conectar ao servidor.");
        });
}



let processandoCadastro = false;

    function cadastrar() {
    if (processandoCadastro) return;

    const nome = document.getElementById('reg-nome').value;
    const doc = document.getElementById('reg-doc').value;
    const email = document.getElementById('reg-email').value; // Novo campo
    const transp = document.getElementById('reg-transp-list').value;
    const senha = document.getElementById('reg-pass').value;
    const senha2 = document.getElementById('reg-pass2').value;

    if (!nome || !doc || !email || !transp || !senha) {
        return alert("Preencha todos os campos!");
    }

    if (senha !== senha2) return alert("As senhas não conferem!");

    processandoCadastro = true;
    const btn = document.getElementById('btn-cadastrar');
    btn.disabled = true;
    btn.innerText = "Processando...";

    // Adicionado e-mail na URL
    const url = `${urlSheets}?action=salvarNovoUsuario` +
                `&nome=${encodeURIComponent(nome)}` +
                `&documento=${encodeURIComponent(doc)}` +
                `&email=${encodeURIComponent(email)}` + 
                `&transp=${encodeURIComponent(transp)}` +
                `&senha=${encodeURIComponent(senha)}`;

    fetch(url)
        .then(res => res.json())
        .then(res => {
            if (res.success) {
                alert("Cadastro realizado com sucesso!");
                location.reload();
            } else {
                alert("Erro: " + res.error);
                resetBotaoCadastro();
            }
        })
        .catch(err => {
            alert("Erro na comunicação.");
            resetBotaoCadastro();
        });
}

function resetBotaoCadastro() {
    processandoCadastro = false;
    const btn = document.getElementById('btn-cadastrar');
    if (btn) {
        btn.disabled = false;
        btn.innerText = "Cadastrar";
    }
}

function atualizarDadosExtras() {
    const romaneioSelect = document.getElementById("romaneio");
    const selectedId = romaneioSelect.value;
    const btnIniciar = document.getElementById("btnIniciar");
    
    if (btnIniciar) {
        btnIniciar.disabled = true;
        btnIniciar.style.opacity = "0.5"; // Feedback visual de bloqueio
    }

    const info = dadosCompletos.find(r => r.Romaneio === selectedId);
    
    if (info) {
        // Preenchimento dos campos (Verifique se esses IDs existem no seu HTML)
        document.getElementById("campo_operador").value = info.Operador || "";
        document.getElementById("transp").value = info.Transp || "";
        
        // Ajuste aqui para os IDs que você colocou no HTML (total_pedidos / total_volumes)
        const f_pedidos = document.getElementById("total_pedidos");
        const f_volumes = document.getElementById("total_volumes");
        
        if(f_pedidos) f_pedidos.value = info.TTPedidos || 0;
        if(f_volumes) f_volumes.value = info.TTvols || 0;

        // Validação da Placa
        const placaCorreta = info.Placa ? info.Placa.toString().toUpperCase().replace(/[^A-Z0-9]/g, '') : "";
        const promptResposta = prompt("🔐 VALIDAÇÃO DE SEGURANÇA\nInforme a PLACA do veículo:");
        const placaDigitada = promptResposta ? promptResposta.toUpperCase().replace(/[^A-Z0-9]/g, '') : "";

        if (placaDigitada !== "" && placaDigitada === placaCorreta) {
            if (btnIniciar) {
                btnIniciar.disabled = false;
                btnIniciar.style.opacity = "1";
                btnIniciar.style.cursor = "pointer";
            }
            alert("✅ Veículo validado!");
        } else {
            alert("❌ Placa incorreta ou Acesso Negado!");
            romaneioSelect.value = "";
            limparCamposExtras();
        }
    } else {
        limparCamposExtras();
    }
}



// Função auxiliar para resetar os campos

    const campos = ["campo_operador", "transp", "ttpedidos", "volumes_total"];
    campos.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = (id === "ttpedidos" || id === "volumes_total") ? 0 : "";

function verificarPendencias() {
    const romaneio = document.getElementById("romaneio").value;

    if (!romaneio) {
        return alert("⚠️ Por favor, selecione um romaneio primeiro!");
    }

    // Feedback visual no botão
    const btn = event.target; // Pega o botão que foi clicado
    const textoOriginal = btn.innerText;
    btn.innerText = "Consultando...";
    btn.disabled = true;

    // Chamada ao backend (usando o fetch que já funciona no seu projeto)
    fetch(`${urlSheets}?action=verificarPendencias&romaneio=${encodeURIComponent(romaneio)}`)
        .then(res => res.json())
        .then(pendencias => {
            btn.innerText = textoOriginal;
            btn.disabled = false;

            if (pendencias.length === 0) {
                alert("✅ Tudo OK! Não há pendências para este romaneio.");
            } else {
                // Formata a lista para exibir ao usuário
                const listaFormatada = pendencias.map(p => `- ${p}`).join('\n');
                alert("📋 ITENS PENDENTES:\n\n" + listaFormatada);
            }
        })
        .catch(err => {
            console.error("Erro ao verificar pendências:", err);
            alert("❌ Erro ao consultar pendências.");
            btn.innerText = textoOriginal;
            btn.disabled = false;
        });
}


async function mostrarPendencias() {
    const romaneio = document.getElementById("romaneio").value;
    const btn = document.getElementById("btnPendencias");

    if (!romaneio) {
        alert("⚠️ Selecione um romaneio primeiro!");
        return;
    }

    // Feedback visual no botão
    const textoOriginal = btn.innerText;
    btn.innerText = "⏳ Consultando...";
    btn.disabled = true;

    try {
        const response = await fetch(`${urlSheets}?action=verificarPendencias&romaneio=${romaneio}`);
        const check = await response.json();
        
        console.log("Resposta do Google:", check);

        if (check.faltantes && check.faltantes.length > 0) {
            const total = check.faltantes.length;
            const listaFormatada = check.faltantes.slice(0, 15).join("\n");
            
            // Adicionado o romaneio no título do alerta
            alert(`📝 ROMANEIO: ${romaneio}\nPENDENCIAS: ${total} item(ns)\n\n${listaFormatada}${total > 15 ? '\n... e outros.' : ''}`);
        } else {
            alert(`✅ Tudo OK!\nNenhuma pendência encontrada no romaneio ${romaneio}.`);
        }
    } catch (e) {
        console.error("Erro técnico:", e);
        alert("❌ Erro técnico ao consultar o servidor.");
    } finally {
        btn.innerText = textoOriginal;
        btn.disabled = false;
    }
}


const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function tocarBeep(tipo) {
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (tipo === 'sucesso') {
        oscillator.type = 'sine'; // Som suave
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Nota Lá (A5)
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        oscillator.stop(audioCtx.currentTime + 0.5);
    } else {
        oscillator.type = 'square'; // Som mais "robusto/alerta"
        oscillator.frequency.setValueAtTime(220, audioCtx.currentTime); // Nota grave
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
        oscillator.stop(audioCtx.currentTime + 0.3);
    }
}

let validandoAgora = false;

async function onScanSuccess(decodedText) {
    if (validandoAgora) return;

    const barcodeLimpo = decodedText.trim();
    const romaneioVal = document.getElementById("romaneio").value;
    const usuario = document.getElementById("usuario").value;
    const status = document.getElementById("status-info");

    // 1. Validações Iniciais
    if (!romaneioVal || !usuario) {
        alert("Selecione o Romaneio e identifique o Conferente!");
        return;
    }

    // 2. Verificação de duplicata local (evita requisição desnecessária)
    if (codigosLidos.includes(barcodeLimpo)) {
        tocarBeep('erro'); // Atualizado para o beep sintético
        status.innerText = "⚠️ JÁ LIDO: " + barcodeLimpo;
        status.style.background = "#fff3cd";
        return;
    }

    validandoAgora = true;
    status.innerText = "🔍 Validando: " + barcodeLimpo + "...";
    status.style.background = "#e2e3e5";

    try {
        const params = new URLSearchParams({
            action: "validarBarcode",
            barcode: barcodeLimpo,
            romaneio: romaneioVal,
            conferente: usuario,
            confirmado: "OK",
            data: new Date().toLocaleString("pt-BR")
        });

        // Adicionamos um timeout manual para não travar se a internet cair
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 segundos

        const response = await fetch(`${urlSheets}?${params.toString()}`, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        const result = await response.json();

        if (result.valid) {
            tocarBeep('sucesso');
            codigosLidos.push(barcodeLimpo);

            // Atualiza Contador
            document.getElementById("contador").innerText = codigosLidos.length;

            // Adiciona na lista visual
            const lista = document.getElementById("itens-lidos");
            const divId = "item-" + barcodeLimpo.replace(/\s+/g, '');
            
            if (!document.getElementById(divId)) {
                const novoItem = document.createElement("div");
                novoItem.className = "item-codigo";
                novoItem.id = divId;
                novoItem.innerHTML = `<span>${barcodeLimpo}</span> <span style="color:var(--success)">✓</span>`;
                lista.insertBefore(novoItem, lista.firstChild);
            }

            status.innerText = "✅ VALIDADO E ATUALIZADO";
            status.style.background = "#d4edda";
        } else {
            tocarBeep('erro');
            status.innerText = "❌ " + (result.error || "INVÁLIDO NO ROMANEIO");
            status.style.background = "#f8d7da";
        }
    } catch (error) {
        console.error("Erro na leitura:", error);
        tocarBeep('erro');
        status.innerText = "🌐 Erro de conexão ou tempo esgotado";
        status.style.background = "#f8d7da";
    } finally {
        // Libera para a próxima leitura após um pequeno delay
        setTimeout(() => {
            validandoAgora = false;
            // Se o status ainda for "Validando", limpa ele
            if (status.innerText.includes("Validando")) {
                status.innerText = "Aguardando leitura...";
                status.style.background = "#eee";
            }
        }, 1500);
    }
}

    function atualizarInterface() {
        document.getElementById("contador").innerText = codigosLidos.length;
        const container = document.getElementById("itens-lidos");
        container.innerHTML = "";
        
        [...codigosLidos].reverse().forEach(codigo => {
            const div = document.createElement("div");
            div.className = "item-codigo";
            div.innerHTML = `<span>📦 ${codigo}</span>`;
            container.appendChild(div);
        });
    }

function removerUltimo() {
    if (codigosLidos.length > 0) {
        // Remove o último do array
        const removido = codigosLidos.pop();
        
        // Remove o primeiro elemento visual da lista (o mais recente)
        const lista = document.getElementById("itens-lidos");
        if (lista.firstChild) {
            lista.removeChild(lista.firstChild);
        }

        // Atualiza o contador com o novo tamanho do array
        document.getElementById("contador").innerText = codigosLidos.length;
        
        const status = document.getElementById("status-info");
        status.innerText = "🗑️ Removido: " + removido;
        status.style.background = "#eee";
    }
}


let html5QrCode; // Variável global

async function iniciarConferencia() {
    const usuarioField = document.getElementById("usuario");
    const romaneioField = document.getElementById("romaneio");
    const btnIniciar = document.getElementById("btnIniciar");
    const readerDiv = document.getElementById("reader");
    const statusInfo = document.getElementById("status-info");

    const usuario = usuarioField.value.trim();
    const romaneioVal = romaneioField.value;

    // 1. Validação
    if (!romaneioVal) {
        alert("⚠️ Por favor, selecione um Romaneio.");
        return;
    }

    // 2. Ativa o contexto de áudio (se houver som de bip)
    if (typeof audioCtx !== 'undefined' && audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }

    // 3. Interface: Ajuste Seguro
    // Em vez de esconder o 'parent', escondemos apenas o próprio botão
    // e garantimos que o reader e o status fiquem visíveis
    btnIniciar.style.display = "none"; 
    readerDiv.style.display = "block";
    if(statusInfo) statusInfo.style.display = "block";

    // 4. Inicializa o motor da câmera
    // Se já existir uma instância rodando, paramos antes de criar nova
    if (html5QrCode) {
        try { await html5QrCode.stop(); } catch (e) { /* ignore */ }
    }

    html5QrCode = new Html5Qrcode("reader");

    const config = { 
        fps: 15, // Aumentado para leitura mais rápida
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0 
    };

    try {
        await html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess 
        );
        console.log("Câmera ativa para: " + usuario);
        if(statusInfo) statusInfo.innerText = "Câmera Ativa. Bipe o código.";
    } catch (err) {
        console.error("Erro na câmera: ", err);
        alert("Erro ao acessar câmera. Verifique as permissões.");
        
        // Reverte interface em caso de erro
        btnIniciar.style.display = "block";
        readerDiv.style.display = "none";
        if(statusInfo) statusInfo.innerText = "Aguardando câmera...";
    }
}

// Mantenha estas referências no topo para que todas as funções as vejam
const canvas = document.getElementById('canvasAssinatura');
const ctx = canvas.getContext('2d');
let desenhando = false;

// Configuração do "lápis"
ctx.lineWidth = 2;
ctx.lineCap = 'round';
ctx.strokeStyle = '#000';

// Descobre a posição exata do clique/toque
function obterPosicao(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

// Começa a desenhar
function iniciar(e) {
    desenhando = true;
    const pos = obterPosicao(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    if (e.cancelable) e.preventDefault(); // Impede a tela de mexer
}

// Risca o canvas
function riscar(e) {
    if (!desenhando) return;
    const pos = obterPosicao(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    if (e.cancelable) e.preventDefault();
}

// Para de desenhar
function parar() { desenhando = false; }

// Liga os eventos (Mouse + Celular)
canvas.addEventListener('mousedown', iniciar);
canvas.addEventListener('mousemove', riscar);
window.addEventListener('mouseup', parar);

canvas.addEventListener('touchstart', iniciar, { passive: false });
canvas.addEventListener('touchmove', riscar, { passive: false });
canvas.addEventListener('touchend', parar);

function limparAssinatura() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function assinaturaVazia() {
    const blank = document.createElement('canvas');
    blank.width = canvas.width;
    blank.height = canvas.height;
    return canvas.toDataURL() === blank.toDataURL();
}

// Variável global para controle de envio
let enviandoDados = false;

async function enviarDadosFinais() {
    // Se já estiver enviando, avisa e interrompe o segundo clique
    if (enviandoDados) {
        alert("⚠️ O envio já está em andamento! Por favor, aguarde a confirmação.");
        return;
    }

    const btn = document.querySelector(".btn-warning") || document.querySelector(".btn-success");
    const romaneio = document.getElementById("romaneio").value;
    const usuario = document.getElementById("usuario").value;
    const areaAssinatura = document.getElementById("areaAssinatura");

    // 1. ATIVA A TRAVA E MUDA A INTERFACE
    enviandoDados = true; 
    btn.disabled = true; // Bloqueio visual/técnico
    btn.innerText = "⏳ Enviando dados, aguarde...";
    
    if (areaAssinatura) {
        areaAssinatura.style.display = "none";
    }

    try {
        const canvasParaEnvio = document.getElementById('canvasAssinatura');
        const assinaturaBase64 = canvasParaEnvio.toDataURL("image/png");

        const payload = {
            romaneio: romaneio,
            usuario: usuario,
            codigos: typeof codigosLidos !== 'undefined' ? codigosLidos : [],
            geo: window.lastGeo || "0,0",
            assinatura: assinaturaBase64,
            conferencia: new Date().toLocaleString("pt-BR"),
            obs_final: window.confirmObs || ""
        };

        const response = await fetch(urlSheets, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
            alert("✅ Romaneio finalizado com sucesso!");
            location.reload(); 
        } else {
            throw new Error(result.error);
        }

    } catch (e) {
        console.error("Erro no Envio:", e);
        alert("❌ Erro no envio. O botão será liberado para tentar novamente.");
        
        // REVERSÃO: Libera a trava e o botão se der erro
        enviandoDados = false;
        btn.disabled = false;
        btn.innerText = "✅ Confirmar Assinatura e Enviar";
        if (areaAssinatura) {
            areaAssinatura.style.display = "block";
        }
    }
}

async function finalizarLote() {
    // Mesma trava aqui para evitar que a validação rode duas vezes
    if (enviandoDados) {
        alert("⚠️ Processando dados... aguarde.");
        return;
    }

    const usuarioField = document.getElementById("usuario");
    const romaneioField = document.getElementById("romaneio");
    const areaAssinatura = document.getElementById("areaAssinatura");
    const btn = document.querySelector(".btn-success") || document.querySelector(".btn-warning");

    if (areaAssinatura.style.display === "block") {
        if (assinaturaVazia()) {
            alert("⚠️ Por favor, assine antes de finalizar!");
            return;
        }
        await enviarDadosFinais();
        return;
    }

    // FASE 1: VALIDAÇÃO
    btn.disabled = true;
    btn.innerText = "🔍 Validando...";

    try {
        const response = await fetch(`${urlSheets}?action=verificarPendencias&romaneio=${romaneioField.value}`);
        const check = await response.json();

        if (check.temPendencia) {
            alert("⚠️ Existem pendências!");
            btn.disabled = false;
            btn.innerText = "Finalizar Lote";
            return;
        }

        // GPS e Câmera (mantido conforme seu original)
        const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
        });
        window.lastGeo = `${pos.coords.latitude}, ${pos.coords.longitude}`;

        // LIBERAR PARA ASSINATURA
        btn.disabled = false;
        btn.classList.add("w-100"); // Block Button
        btn.innerText = "✅ Confirmar Assinatura e Enviar";
        btn.classList.replace("btn-success", "btn-warning");
        areaAssinatura.style.display = "block";

    } catch (e) {
        btn.disabled = false;
        btn.innerText = "Finalizar Lote";
        alert("❌ Falha na validação inicial.");
    }
}
