<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APP VIVO: Passagem de Carga</title>
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --nu-purple: #820ad1;
            --nu-purple-dark: #6d09b1;
            --nu-gray: #f5f5f5;
            --nu-text: #111111;
            --nu-text-light: #666666;
            --error: #e63946;
            --success: #2b9348;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding: 12px; background: var(--nu-gray); color: var(--nu-text); line-height: 1.4;
        }
        .card { 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 500px; margin: auto; 
        }
        h3 { color: var(--nu-purple); font-weight: 700; margin: 0 0 20px 0; font-size: 1.4rem; text-align: center; }
        label { 
            font-size: 12px; color: var(--nu-purple); font-weight: 700; 
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; display: block;
        }
        input, select { 
            width: 100%; height: 52px; padding: 0 16px; margin-bottom: 16px; 
            border: 1px solid #ddd; border-radius: 12px; font-size: 16px; background: #fff;
        }
        input:focus { outline: none; border-color: var(--nu-purple); box-shadow: 0 0 0 2px rgba(130, 10, 209, 0.1); }
        .btn { 
            width: 100%; height: 56px; border: none; border-radius: 28px; 
            font-weight: 700; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
        }
        .btn-success { background: var(--nu-purple); color: white; margin-top: 10px; }
        .btn-success:disabled { background: #ccc; cursor: not-allowed; }
        .btn-warning { background: #fff; color: var(--error); border: 1.5px solid var(--error); height: 36px; font-size: 13px; padding: 0 15px; border-radius: 18px; width: auto; }
        .btn-link { background: none; border: none; color: var(--nu-purple); cursor: pointer; font-size: 14px; text-decoration: none; margin-top: 10px; }
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        #status-info { padding: 10px; border-radius: 8px; font-size: 14px; text-align: center; margin-bottom: 15px; background: #eee; }
        .lidos-container { border: 1px solid #eee; border-radius: 12px; padding: 12px; background: #fafafa; margin-bottom: 15px; }
        #itens-lidos { max-height: 150px; overflow-y: auto; margin-top: 10px; }
        .item-codigo { background: white; padding: 10px; margin-bottom: 6px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 14px; border: 1px solid #eee; }
        #contador { color: var(--nu-purple); font-size: 20px; font-weight: 800; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- TELA 1: LOGIN -->
    <div id="telaLogin" class="card">
        <h3>Acesso ao Sistema</h3>
        <label>Usuário</label>
        <input type="text" id="loginUsuario" placeholder="Seu usuário">
        <label>Senha</label>
        <input type="password" id="loginSenha" placeholder="••••••••">
        <label>Transportadora</label>
        <select id="loginTransportadora">
            <option value="">Selecione a Transportadora</option>
        </select>
        <button class="btn btn-success" onclick="logar()">Entrar</button>
        <div style="text-align: center; margin-top: 20px;">
            <button class="btn-link" onclick="navegar('telaRecuperar')">Esqueci minha senha</button>
            <p style="font-size: 14px;">Não tem senha? <b style="color:var(--nu-purple); cursor:pointer" onclick="navegar('telaCadastro')">Cadastre-se...</b></p>
        </div>
    </div>

    <!-- TELA 2: RECUPERAR SENHA -->
    <div id="telaRecuperar" class="card hidden">
        <h3>Recuperar Senha</h3>
        <p style="text-align:center; font-size:14px; color:var(--nu-text-light)">Enviaremos instruções para o seu e-mail.</p>
        <label>E-mail</label>
        <input type="email" id="recuperarEmail" placeholder="seuemail@empresa.com">
        <button class="btn btn-success" onclick="recuperarSenha()">Recuperar Senha</button>
        <button class="btn-link" style="width:100%" onclick="navegar('telaLogin')">← Voltar ao Login</button>
    </div>

    <!-- TELA 3: CADASTRO -->
    <div id="telaCadastro" class="card hidden">
        <h3>Novo Cadastro</h3>
        <label>Nome Completo</label>
        <input type="text" id="cadNome" placeholder="Ex: João Silva">
        <label>Documento</label>
        <input type="text" id="cadDoc" placeholder="CPF ou CNPJ">
        <label>Transportadora</label>
        <select id="cadTransp">
            <option value="">Selecione...</option>
        </select>
        <label>Senha</label>
        <input type="password" id="cadSenha" placeholder="Crie uma senha">
        <label>Repita a Senha</label>
        <input type="password" id="cadSenhaConf" placeholder="Confirme a senha">
        <button id="btnCadastrar" class="btn btn-success" onclick="cadastrarUsuario()">Cadastrar</button>
        <button class="btn-link" style="width:100%" onclick="navegar('telaLogin')">Já tenho conta</button>
    </div>

    <!-- TELA 4: CONFERÊNCIA (SUA TELA ORIGINAL) -->
    <div id="telaPrincipal" class="card hidden">
        <h3>Conferencia de Carga</h3>
        
        <label>Conferente</label>
        <input type="text" id="usuario" readonly> <!-- Preenchido pelo login -->

        <label>Romaneio</label>
        <select id="romaneio" onchange="atualizarDadosExtras()">
            <option value="">Selecione o Romaneio</option>
        </select>

        <div class="grid-info">
            <div><label>Transportadora</label><input type="text" id="transp" readonly></div>
            <div><label>Operador</label><input type="text" id="campo_operador" readonly></div>
        </div>
        <div class="grid-info">
            <div><label>Total Pedidos</label><input type="text" id="ttpedidos" readonly></div>
            <div><label>Total Volumes</label><input type="number" id="volumes_total" readonly></div>
        </div>

        <button id="btnIniciar" class="btn btn-success" onclick="iniciarConferencia()" disabled style="opacity:0.5; margin: 15px 0;">Iniciar Conferência</button>
        
        <div id="reader" class="hidden" style="width:100%; border-radius:8px; overflow:hidden; margin-bottom:10px;"></div>
        <div id="status-info">Aguardando câmera...</div>

        <button id="btnPendencias" class="btn btn-success" style="height:45px; margin-bottom:15px;" onclick="mostrarPendencias()">Lista de Pendências</button>

        <div class="lidos-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <strong>Lidos: <span id="contador">0</span></strong>
                <button class="btn-warning" onclick="removerUltimo()">✕ Remover Último</button>
            </div>
            <div id="itens-lidos"></div>
        </div>

        <button class="btn btn-success" onclick="finalizarLote()">Finalizar Lote</button>
        
        <div id="areaAssinatura" class="hidden" style="margin-top:15px; text-align:center;">
            <label>Assine aqui:</label>
            <canvas id="canvasAssinatura" width="300" height="150" style="border:1px solid #000; background:#fff; border-radius:8px;"></canvas>
            <button class="btn-link" onclick="limparAssinatura()">Limpar Assinatura</button>
        </div>
    </div>
  
<script>

         // --- LÓGICA DE NAVEGAÇÃO E NOVAS TELAS ---
        function navegar(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function logar() {
            const user = document.getElementById('loginUsuario').value;
            if(!user) return alert("Digite o usuário");
            document.getElementById('usuario').value = user;
            navegar('telaPrincipal');
        }

        let cadastrando = false;
        async function cadastrarUsuario() {
            if(cadastrando) return;
            const btn = document.getElementById('btnCadastrar');
            
            // Validação simples de senha
            if(document.getElementById('cadSenha').value !== document.getElementById('cadSenhaConf').value) {
                return alert("Senhas não coincidem!");
            }

            cadastrando = true;
            btn.disabled = true;
            btn.innerText = "Cadastrando...";
            
            // Simulação de delay de rede
            setTimeout(() => {
                alert("Usuário cadastrado com sucesso!");
                cadastrando = false;
                btn.disabled = false;
                btn.innerText = "Cadastrar";
                navegar('telaLogin');
            }, 2000);
        }

        function recuperarSenha() {
            alert("Se o e-mail existir na base, você receberá um link de recuperação.");
            navegar('telaLogin');
        }

        // --- SUA LÓGICA ORIGINAL (MANTIDA) ---  
    
    let codigosLidos = [];
    let dadosCompletos = []; 
    const urlSheets = "https://script.google.com/macros/s/AKfycbyOkNObww3Q-pnQOWUZM9nJIsXJjwqZRpfbDD8ak3LJ9ORoEia_P5wjjq6dc3ufnVbx/exec"; // Substituir pela sua URL real

    const somSucesso = new Audio('https://mixkit.co');
    const somErro = new Audio('https://mixkit.co');

    window.onload = function() {
        // 1. Carrega os Romaneios (Via Fetch - Sua lógica atual)
        fetch(urlSheets + "?action=getRomaneios")
            .then(res => res.json())
            .then(data => {
                dadosCompletos = data;
                const select = document.getElementById("romaneio");
                select.innerHTML = '<option value="">Selecione o Romaneio</option>';
    
                data.forEach(item => {
                    if (!item.Conferencia || item.Conferencia.toString().trim() === "") {
                        let opt = document.createElement("option");
                        opt.value = item.Romaneio;
                        opt.innerHTML = item.Romaneio;
                        select.appendChild(opt);
                    }
                });
            })
            .catch(err => console.error("Erro nos romaneios:", err));
    
        // 2. Carrega as Transportadoras (Via google.script.run para evitar bloqueio CORS)
        if (typeof google !== 'undefined' && google.script) {
            google.script.run
                .withSuccessHandler(function(lista) {
                    const ids = ['loginTransportadora', 'cadTransp'];
                    ids.forEach(id => {
                        const el = document.getElementById(id);
                        if (el) {
                            el.innerHTML = '<option value="">Selecione a Transportadora</option>';
                            lista.forEach(transp => {
                                let opt = document.createElement('option');
                                opt.value = transp;
                                opt.innerHTML = transp;
                                el.appendChild(opt);
                            });
                        }
                    });
                })
                .getTransportadorasAPI();
        }
    };


function atualizarDadosExtras() {
    const romaneioSelect = document.getElementById("romaneio");
    const selectedId = romaneioSelect.value;
    
    // Busca o botão pelo ID correto
    const btnIniciar = document.getElementById("btnIniciar");
    
    // Bloqueio preventivo
    if (btnIniciar) {
        btnIniciar.disabled = true;
    }

    const info = dadosCompletos.find(r => r.Romaneio === selectedId);
    
    if (info) {
        document.getElementById("campo_operador").value = info.Operador || "";
        document.getElementById("transp").value = info.Transp || "";
        document.getElementById("ttpedidos").value = info.TTPedidos || 0;
        document.getElementById("volumes_total").value = info.TTvols || 0;

        const placaCorreta = info.Placa ? info.Placa.toString().toUpperCase().replace(/[^A-Z0-9]/g, '') : "";
        const promptResposta = prompt("🔐 VALIDAÇÃO DE SEGURANÇA\nInforme a PLACA do veículo:");
        const placaDigitada = promptResposta ? promptResposta.toUpperCase().replace(/[^A-Z0-9]/g, '') : "";

        if (placaDigitada !== "" && placaDigitada === placaCorreta) {
            if (btnIniciar) {
                btnIniciar.disabled = false; // Desbloqueia o botão
                btnIniciar.style.opacity = "1" // Remove transparence
                btnIniciar.style.cursor = "pointer" // Volta o cursor de "mãozinha"
            }
            alert("✅ Veículo validado!");
        } else {
            alert("❌ Acesso Negado!");
            if (btnIniciar) {
                btnIniciar.disabled = true;
            }
            romaneioSelect.value = "";
            limparCamposExtras();
        }
    } else {
        limparCamposExtras();
    }
}



// Função auxiliar para resetar os campos
function limparCamposExtras() {
    const campos = ["campo_operador", "transp", "ttpedidos", "volumes_total"];
    campos.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = (id === "ttpedidos" || id === "volumes_total") ? 0 : "";
    });
}



async function mostrarPendencias() {
    const romaneio = document.getElementById("romaneio").value;
    const btn = document.getElementById("btnPendencias");

    if (!romaneio) {
        alert("⚠️ Selecione um romaneio primeiro!");
        return;
    }

    // Feedback visual no botão
    const textoOriginal = btn.innerText;
    btn.innerText = "⏳ Consultando...";
    btn.disabled = true;

    try {
        const response = await fetch(`${urlSheets}?action=verificarPendencias&romaneio=${romaneio}`);
        const check = await response.json();
        
        console.log("Resposta do Google:", check);

        if (check.faltantes && check.faltantes.length > 0) {
            const total = check.faltantes.length;
            const listaFormatada = check.faltantes.slice(0, 15).join("\n");
            
            // Adicionado o romaneio no título do alerta
            alert(`📝 ROMANEIO: ${romaneio}\nPENDENCIAS: ${total} item(ns)\n\n${listaFormatada}${total > 15 ? '\n... e outros.' : ''}`);
        } else {
            alert(`✅ Tudo OK!\nNenhuma pendência encontrada no romaneio ${romaneio}.`);
        }
    } catch (e) {
        console.error("Erro técnico:", e);
        alert("❌ Erro técnico ao consultar o servidor.");
    } finally {
        btn.innerText = textoOriginal;
        btn.disabled = false;
    }
}


const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function tocarBeep(tipo) {
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    if (tipo === 'sucesso') {
        oscillator.type = 'sine'; // Som suave
        oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Nota Lá (A5)
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        oscillator.stop(audioCtx.currentTime + 0.5);
    } else {
        oscillator.type = 'square'; // Som mais "robusto/alerta"
        oscillator.frequency.setValueAtTime(220, audioCtx.currentTime); // Nota grave
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        oscillator.start();
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
        oscillator.stop(audioCtx.currentTime + 0.3);
    }
}

let validandoAgora = false;

async function onScanSuccess(decodedText) {
    if (validandoAgora) return;

    const barcodeLimpo = decodedText.trim();
    const romaneioVal = document.getElementById("romaneio").value;
    const usuario = document.getElementById("usuario").value;
    const status = document.getElementById("status-info");

    // 1. Validações Iniciais
    if (!romaneioVal || !usuario) {
        alert("Selecione o Romaneio e identifique o Conferente!");
        return;
    }

    // 2. Verificação de duplicata local (evita requisição desnecessária)
    if (codigosLidos.includes(barcodeLimpo)) {
        tocarBeep('erro'); // Atualizado para o beep sintético
        status.innerText = "⚠️ JÁ LIDO: " + barcodeLimpo;
        status.style.background = "#fff3cd";
        return;
    }

    validandoAgora = true;
    status.innerText = "🔍 Validando: " + barcodeLimpo + "...";
    status.style.background = "#e2e3e5";

    try {
        const params = new URLSearchParams({
            action: "validarBarcode",
            barcode: barcodeLimpo,
            romaneio: romaneioVal,
            conferente: usuario,
            confirmado: "OK",
            data: new Date().toLocaleString("pt-BR")
        });

        // Adicionamos um timeout manual para não travar se a internet cair
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000); // 10 segundos

        const response = await fetch(`${urlSheets}?${params.toString()}`, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        const result = await response.json();

        if (result.valid) {
            tocarBeep('sucesso');
            codigosLidos.push(barcodeLimpo);

            // Atualiza Contador
            document.getElementById("contador").innerText = codigosLidos.length;

            // Adiciona na lista visual
            const lista = document.getElementById("itens-lidos");
            const divId = "item-" + barcodeLimpo.replace(/\s+/g, '');
            
            if (!document.getElementById(divId)) {
                const novoItem = document.createElement("div");
                novoItem.className = "item-codigo";
                novoItem.id = divId;
                novoItem.innerHTML = `<span>${barcodeLimpo}</span> <span style="color:var(--success)">✓</span>`;
                lista.insertBefore(novoItem, lista.firstChild);
            }

            status.innerText = "✅ VALIDADO E ATUALIZADO";
            status.style.background = "#d4edda";
        } else {
            tocarBeep('erro');
            status.innerText = "❌ " + (result.error || "INVÁLIDO NO ROMANEIO");
            status.style.background = "#f8d7da";
        }
    } catch (error) {
        console.error("Erro na leitura:", error);
        tocarBeep('erro');
        status.innerText = "🌐 Erro de conexão ou tempo esgotado";
        status.style.background = "#f8d7da";
    } finally {
        // Libera para a próxima leitura após um pequeno delay
        setTimeout(() => {
            validandoAgora = false;
            // Se o status ainda for "Validando", limpa ele
            if (status.innerText.includes("Validando")) {
                status.innerText = "Aguardando leitura...";
                status.style.background = "#eee";
            }
        }, 1500);
    }
}

    function atualizarInterface() {
        document.getElementById("contador").innerText = codigosLidos.length;
        const container = document.getElementById("itens-lidos");
        container.innerHTML = "";
        
        [...codigosLidos].reverse().forEach(codigo => {
            const div = document.createElement("div");
            div.className = "item-codigo";
            div.innerHTML = `<span>📦 ${codigo}</span>`;
            container.appendChild(div);
        });
    }

function removerUltimo() {
    if (codigosLidos.length > 0) {
        // Remove o último do array
        const removido = codigosLidos.pop();
        
        // Remove o primeiro elemento visual da lista (o mais recente)
        const lista = document.getElementById("itens-lidos");
        if (lista.firstChild) {
            lista.removeChild(lista.firstChild);
        }

        // Atualiza o contador com o novo tamanho do array
        document.getElementById("contador").innerText = codigosLidos.length;
        
        const status = document.getElementById("status-info");
        status.innerText = "🗑️ Removido: " + removido;
        status.style.background = "#eee";
    }
}


    let html5QrCode; // Variável global

async function iniciarConferencia() {
    const usuarioField = document.getElementById("usuario");
    const romaneioField = document.getElementById("romaneio");
    const btnIniciar = document.getElementById("btnIniciar");
    const readerDiv = document.getElementById("reader");

    const usuario = usuarioField.value.trim();
    const romaneioVal = romaneioField.value;

    // 1. Validação Dupla
    if (!romaneioVal) {
        alert("⚠️ Por favor, selecione um Romaneio.");
        romaneioField.focus();
        return;
    }

    if (!usuario) {
        alert("⚠️ Por favor, identifique o Conferente.");
        usuarioField.focus();
        return;
    }

    // 2. Ativa o contexto de áudio (resolve o bloqueio do som pelo navegador)
    if (typeof audioCtx !== 'undefined' && audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }

    // 3. Interface: Esconde o container do botão e mostra a câmera
    // Usamos parentElement para esconder a DIV que centraliza o botão
    btnIniciar.parentElement.style.display = "none";
    readerDiv.style.display = "block";

    // 4. Inicializa o motor da câmera (Html5Qrcode)
    html5QrCode = new Html5Qrcode("reader");

    const config = { 
        fps: 10, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0 // Isso cria um quadrado perfeito ou use 1.777 para 16:9
    };

    try {
        // Inicia a câmera traseira ("environment")
        await html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess // Sua função de leitura
        );
        console.log("Conferência iniciada por: " + usuario);
    } catch (err) {
        console.error("Erro ao iniciar a câmera: ", err);
        alert("Não foi possível acessar a câmera. Verifique as permissões do navegador.");
        
        // Caso dê erro, volta o botão para a tela
        btnIniciar.parentElement.style.display = "flex";
        readerDiv.style.display = "none";
    }
}

// Mantenha estas referências no topo para que todas as funções as vejam
const canvas = document.getElementById('canvasAssinatura');
const ctx = canvas.getContext('2d');
let desenhando = false;

// Configuração do "lápis"
ctx.lineWidth = 2;
ctx.lineCap = 'round';
ctx.strokeStyle = '#000';

// Descobre a posição exata do clique/toque
function obterPosicao(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

// Começa a desenhar
function iniciar(e) {
    desenhando = true;
    const pos = obterPosicao(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
    if (e.cancelable) e.preventDefault(); // Impede a tela de mexer
}

// Risca o canvas
function riscar(e) {
    if (!desenhando) return;
    const pos = obterPosicao(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    if (e.cancelable) e.preventDefault();
}

// Para de desenhar
function parar() { desenhando = false; }

// Liga os eventos (Mouse + Celular)
canvas.addEventListener('mousedown', iniciar);
canvas.addEventListener('mousemove', riscar);
window.addEventListener('mouseup', parar);

canvas.addEventListener('touchstart', iniciar, { passive: false });
canvas.addEventListener('touchmove', riscar, { passive: false });
canvas.addEventListener('touchend', parar);

function limparAssinatura() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function assinaturaVazia() {
    const blank = document.createElement('canvas');
    blank.width = canvas.width;
    blank.height = canvas.height;
    return canvas.toDataURL() === blank.toDataURL();
}

// Variável global para controle de envio
let enviandoDados = false;

async function enviarDadosFinais() {
    // Se já estiver enviando, avisa e interrompe o segundo clique
    if (enviandoDados) {
        alert("⚠️ O envio já está em andamento! Por favor, aguarde a confirmação.");
        return;
    }

    const btn = document.querySelector(".btn-warning") || document.querySelector(".btn-success");
    const romaneio = document.getElementById("romaneio").value;
    const usuario = document.getElementById("usuario").value;
    const areaAssinatura = document.getElementById("areaAssinatura");

    // 1. ATIVA A TRAVA E MUDA A INTERFACE
    enviandoDados = true; 
    btn.disabled = true; // Bloqueio visual/técnico
    btn.innerText = "⏳ Enviando dados, aguarde...";
    
    if (areaAssinatura) {
        areaAssinatura.style.display = "none";
    }

    try {
        const canvasParaEnvio = document.getElementById('canvasAssinatura');
        const assinaturaBase64 = canvasParaEnvio.toDataURL("image/png");

        const payload = {
            romaneio: romaneio,
            usuario: usuario,
            codigos: typeof codigosLidos !== 'undefined' ? codigosLidos : [],
            geo: window.lastGeo || "0,0",
            assinatura: assinaturaBase64,
            conferencia: new Date().toLocaleString("pt-BR"),
            obs_final: window.confirmObs || ""
        };

        const response = await fetch(urlSheets, {
            method: 'POST',
            mode: 'cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
            alert("✅ Romaneio finalizado com sucesso!");
            location.reload(); 
        } else {
            throw new Error(result.error);
        }

    } catch (e) {
        console.error("Erro no Envio:", e);
        alert("❌ Erro no envio. O botão será liberado para tentar novamente.");
        
        // REVERSÃO: Libera a trava e o botão se der erro
        enviandoDados = false;
        btn.disabled = false;
        btn.innerText = "✅ Confirmar Assinatura e Enviar";
        if (areaAssinatura) {
            areaAssinatura.style.display = "block";
        }
    }
}

async function finalizarLote() {
    // Mesma trava aqui para evitar que a validação rode duas vezes
    if (enviandoDados) {
        alert("⚠️ Processando dados... aguarde.");
        return;
    }

    const usuarioField = document.getElementById("usuario");
    const romaneioField = document.getElementById("romaneio");
    const areaAssinatura = document.getElementById("areaAssinatura");
    const btn = document.querySelector(".btn-success") || document.querySelector(".btn-warning");

    if (areaAssinatura.style.display === "block") {
        if (assinaturaVazia()) {
            alert("⚠️ Por favor, assine antes de finalizar!");
            return;
        }
        await enviarDadosFinais();
        return;
    }

    // FASE 1: VALIDAÇÃO
    btn.disabled = true;
    btn.innerText = "🔍 Validando...";

    try {
        const response = await fetch(`${urlSheets}?action=verificarPendencias&romaneio=${romaneioField.value}`);
        const check = await response.json();

        if (check.temPendencia) {
            alert("⚠️ Existem pendências!");
            btn.disabled = false;
            btn.innerText = "Finalizar Lote";
            return;
        }

        // GPS e Câmera (mantido conforme seu original)
        const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 8000 });
        });
        window.lastGeo = `${pos.coords.latitude}, ${pos.coords.longitude}`;

        // LIBERAR PARA ASSINATURA
        btn.disabled = false;
        btn.classList.add("w-100"); // Block Button
        btn.innerText = "✅ Confirmar Assinatura e Enviar";
        btn.classList.replace("btn-success", "btn-warning");
        areaAssinatura.style.display = "block";

    } catch (e) {
        btn.disabled = false;
        btn.innerText = "Finalizar Lote";
        alert("❌ Falha na validação inicial.");
    }
}
